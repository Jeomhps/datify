name: Test Datify

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TEMPORARY: datify pins @preview/datify-core:2.0.0, which is not yet on the
      # Typst registry. Resolve it from the sibling repo by dropping it into
      # Typst's local package directory (tytanic's embedded Typst reads the same
      # package dirs). Remove this once datify-core 2.0.0 is published, and update
      # the pin/ref accordingly.
      - name: Check out unpublished datify-core
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Jeomhps/datify-core
          ref: refactor/core-rebuild
          path: .datify-core-src

      - name: Link datify-core 2.0.0 into Typst's local package dir
        run: |
          DEST="${XDG_DATA_HOME:-$HOME/.local/share}/typst/packages/preview/datify-core/2.0.0"
          mkdir -p "$DEST"
          cp -r .datify-core-src/typst.toml .datify-core-src/src "$DEST"/
          test -f "$DEST/src/main.typ" && echo "datify-core 2.0.0 linked at $DEST"

      # No setup-typst: tytanic embeds the Typst compiler (0.2.2 -> Typst 0.13.x,
      # matching the compiler pin in typst.toml).
      - name: Install tytanic
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: tytanic@0.2.2

      - name: Run test suite
        run: tt run --root .

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: artifacts
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 1
