name: Test Datify

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Typst CLI
        run: |
          curl -L https://github.com/typst/typst/releases/download/v0.13.1/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
          tar -xf typst.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          typst --version

      # TEMPORARY: datify pins @preview/datify-core:2.0.0, which is not yet
      # published to the Typst registry. Until it is, resolve it from the sibling
      # repo by dropping it into Typst's local package directory (this overrides
      # the registry copy of that version). Remove this block once datify-core
      # 2.0.0 is published, and update the pin/ref accordingly.
      - name: Check out unpublished datify-core
        uses: actions/checkout@v4
        with:
          repository: Jeomhps/datify-core
          ref: refactor/core-rebuild
          path: .datify-core-src

      - name: Link datify-core 2.0.0 into Typst's local package dir
        run: |
          DEST="${XDG_DATA_HOME:-$HOME/.local/share}/typst/packages/preview/datify-core/2.0.0"
          mkdir -p "$DEST"
          cp -r .datify-core-src/typst.toml .datify-core-src/src "$DEST"/
          test -f "$DEST/src/main.typ" && echo "datify-core 2.0.0 linked at $DEST"

      - name: Install tytanic
        run: |
          curl -L https://github.com/typst-community/tytanic/releases/download/v0.2.2/tytanic-x86_64-unknown-linux-musl.tar.xz -o tytanic.tar.xz
          tar -xf tytanic.tar.xz
          sudo mv tytanic-x86_64-unknown-linux-musl/tt /usr/local/bin/
          tt --version

      - name: Run test suite
        run: tt run

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artifacts
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5
